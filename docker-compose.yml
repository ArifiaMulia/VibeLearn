version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: vibelearn_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: vibelearn_db
      POSTGRES_USER: vibelearn_user
      POSTGRES_PASSWORD: vibelearn_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - coolify
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibelearn_user -d vibelearn_db"]
      interval: 10s
      retries: 5
      start_period: 20s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: vibelearn_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - coolify
    environment:
      DATABASE_URL: postgres://vibelearn_user:vibelearn_pass@db:5432/vibelearn_db
      JWT_SECRET: ${JWT_SECRET:-vibelearn_super_secret_key_change_in_prod}
      NODE_ENV: production
      PORT: 3000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vibelearn-api.rule=Host(`${DOMAIN:-vibe.virtuenet.space}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.vibelearn-api.entrypoints=https"
      - "traefik.http.routers.vibelearn-api.tls=true"
      - "traefik.http.routers.vibelearn-api.tls.certresolver=letsencrypt"
      - "traefik.http.middlewares.strip-api.stripprefix.prefixes=/api"
      - "traefik.http.routers.vibelearn-api.middlewares=strip-api"
      - "traefik.http.services.vibelearn-api.loadbalancer.server.port=3000"
      - "traefik.docker.network=coolify"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vibelearn_frontend
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vibelearn.rule=Host(`${DOMAIN:-vibe.virtuenet.space}`)"
      - "traefik.http.routers.vibelearn.entrypoints=https"
      - "traefik.http.routers.vibelearn.tls=true"
      - "traefik.http.routers.vibelearn.tls.certresolver=letsencrypt"
      - "traefik.http.services.vibelearn.loadbalancer.server.port=80"
      - "traefik.docker.network=coolify"
      # HTTP -> HTTPS redirect
      - "traefik.http.routers.vibelearn-http.rule=Host(`${DOMAIN:-vibe.virtuenet.space}`)"
      - "traefik.http.routers.vibelearn-http.entrypoints=http"
      - "traefik.http.routers.vibelearn-http.middlewares=redirect-https"
      - "traefik.http.middlewares.redirect-https.redirectscheme.scheme=https"

networks:
  coolify:
    external: true

volumes:
  pgdata:
