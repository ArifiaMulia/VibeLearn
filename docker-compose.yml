version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: vibelearn_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: vibelearn_db
      POSTGRES_USER: vibelearn_user
      POSTGRES_PASSWORD: vibelearn_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - coolify
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibelearn_user -d vibelearn_db"]
      interval: 10s
      retries: 5
      start_period: 20s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: vibelearn_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - coolify
    environment:
      DATABASE_URL: postgres://vibelearn_user:vibelearn_pass@db:5432/vibelearn_db
      JWT_SECRET: ${JWT_SECRET:-vibelearn_super_secret_key_change_in_prod}
      NODE_ENV: production
      PORT: 3000
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.vibe-api-https.rule=Host(`vibe.virtuenet.space`) && PathPrefix(`/api`)"
      - "traefik.http.routers.vibe-api-https.entrypoints=https"
      - "traefik.http.routers.vibe-api-https.tls=true"
      - "traefik.http.routers.vibe-api-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.vibe-api-https.service=vibe-api-svc"
      - "traefik.http.services.vibe-api-svc.loadbalancer.server.port=3000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vibelearn_frontend
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.vibe-fe-https.rule=Host(`vibe.virtuenet.space`)"
      - "traefik.http.routers.vibe-fe-https.entrypoints=https"
      - "traefik.http.routers.vibe-fe-https.tls=true"
      - "traefik.http.routers.vibe-fe-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.vibe-fe-https.service=vibe-fe-svc"
      - "traefik.http.services.vibe-fe-svc.loadbalancer.server.port=80"
      # HTTP -> HTTPS redirect
      - "traefik.http.routers.vibe-fe-http.rule=Host(`vibe.virtuenet.space`)"
      - "traefik.http.routers.vibe-fe-http.entrypoints=http"
      - "traefik.http.routers.vibe-fe-http.middlewares=vibe-redirect-https"
      - "traefik.http.middlewares.vibe-redirect-https.redirectscheme.scheme=https"

networks:
  coolify:
    external: true

volumes:
  pgdata:
